# Production compose — مخصص للإنتاج على Hostinger VPS KVM 2 (Ubuntu 24.04)
# التشغيل: docker compose -f docker-compose.prod.yml up -d --build
#
# متغيرات البيئة المطلوبة في /opt/collective-trust/.env
# (انظر .env.production.example للتفاصيل الكاملة)

services:

  # ── قاعدة البيانات ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stgp_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stgp_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── الكاش ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── الخادم الخلفي (NestJS) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/stgp_prod?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PLATFORM_BOOTSTRAP_SECRET: ${PLATFORM_BOOTSTRAP_SECRET}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      UNIFONIC_APP_SID: ${UNIFONIC_APP_SID:-}
      UNIFONIC_SENDER_ID: ${UNIFONIC_SENDER_ID:-}
      ENABLE_QUEUES: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      UPLOAD_DIR: /app/uploads
      PORT: "3001"
      ALLOWED_ORIGINS: "https://stpg.wbgl.tech"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    command: sh -c "npx prisma migrate deploy && node dist/main"

  # ── الواجهة الأمامية (Next.js) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://stpg.wbgl.tech/api
        NEXT_PUBLIC_ENABLE_DEV_LOGIN: "false"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy

  # ── الوكيل العكسي (Caddy — TLS تلقائي) ──────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/collective-trust/uploads
