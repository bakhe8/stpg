# Production compose — مخصص للإنتاج على Hostinger VPS KVM 2 (Ubuntu 24.04)
# التشغيل: docker compose -f docker-compose.prod.yml up -d --build
#
# متغيرات البيئة المطلوبة في /opt/collective-trust/.env
# (انظر .env.production.example للتفاصيل الكاملة)

services:

  # ── قاعدة البيانات ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stgp_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stgp_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── الكاش ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── محرك البحث الداخلي ───────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_PERFORMANCE_ANALYZER_AGENT_CLI=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── محرك سير العمل الداخلي ───────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: ${DB_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./deploy/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal:7233 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s

  # ── تهيئة مستخدم تطبيق غير superuser ─────────────────────
  db-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_APP_USER: ${DB_APP_USER:-stgp_app}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    volumes:
      - ./deploy/postgres/init-app-role.sh:/init-app-role.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/init-app-role.sh"]

  # ── الخادم الخلفي (NestJS) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ENABLE_DEV_LOGIN: "false"
      DATABASE_URL: postgres://${DB_APP_USER:-stgp_app}:${DB_APP_PASSWORD}@postgres:5432/stgp_prod?sslmode=disable
      MIGRATION_DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/stgp_prod?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PLATFORM_BOOTSTRAP_SECRET: ${PLATFORM_BOOTSTRAP_SECRET}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      APPLE_OAUTH_CLIENT_ID: ${APPLE_OAUTH_CLIENT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MOYASAR_SECRET_KEY: ${MOYASAR_SECRET_KEY:-}
      MOYASAR_WEBHOOK_SECRET: ${MOYASAR_WEBHOOK_SECRET:-}
      MOYASAR_API_BASE_URL: ${MOYASAR_API_BASE_URL:-}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL:-https://stpg.wbgl.tech/finance}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-https://stpg.wbgl.tech}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      UNIFONIC_API_KEY: ${UNIFONIC_API_KEY:-}
      UNIFONIC_SENDER_ID: ${UNIFONIC_SENDER_ID:-}
      ENABLE_QUEUES: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OPENSEARCH_NODE: ${OPENSEARCH_NODE:-http://opensearch:9200}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      UPLOAD_DIR: /app/uploads
      PORT: "3001"
      ALLOWED_ORIGINS: "https://stpg.wbgl.tech"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    command: sh -c "DATABASE_URL=$${MIGRATION_DATABASE_URL} npx prisma migrate deploy && node dist/main"

  # ── الواجهة الأمامية (Next.js) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://stpg.wbgl.tech/api
        NEXT_PUBLIC_ENABLE_DEV_LOGIN: "false"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy

  # ── الوكيل الداخلي (Caddy خلف Nginx العام على السيرفر) ────
  #
  # wbgl.tech يستضيف أكثر من برنامج. لذلك Nginx على المضيف هو
  # من يمسك 80/443 و TLS، ثم يمرر stpg.wbgl.tech إلى Caddy هنا.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STGP_HTTP_PORT:-3080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  caddy_data:
  caddy_config:
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/collective-trust/uploads
