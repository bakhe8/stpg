name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ghcr.io requires lowercase — convert the repo name
  IMAGE_REPO: ${{ github.repository }}

jobs:
  # ══════════════════════════════════════════════════════════
  #  BACKEND — Build & Test
  # ══════════════════════════════════════════════════════════
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests
        env:
          # unit tests mock the DB — just needs a valid-format URL
          DATABASE_URL: postgresql://postgres:ci@localhost:5432/stgp_ci

  # ══════════════════════════════════════════════════════════
  #  FRONTEND — Type-check, Build & Test
  # ══════════════════════════════════════════════════════════
  frontend-ci:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
          NEXT_PUBLIC_ENABLE_DEV_LOGIN: 'false'
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Unit tests
        run: npm test -- --passWithNoTests

  # ══════════════════════════════════════════════════════════
  #  DOCKER — Build & Push to GHCR
  #  runs only on push to main after CI passes
  # ══════════════════════════════════════════════════════════
  docker-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image repo
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push — backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push — frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_ENABLE_DEV_LOGIN=false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ══════════════════════════════════════════════════════════
  #  DEPLOY — SSH into VPS and pull new images
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production        # enables manual approval gate if configured

    steps:
      - uses: actions/checkout@v4   # needed for docker-compose.prod.yml

      - name: Lowercase image repo
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/stgp

            # Pull latest images from GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            IMAGE_REPO="${{ steps.repo.outputs.name }}"
            export BACKEND_IMAGE="ghcr.io/${IMAGE_REPO}/backend:${{ github.sha }}"
            export FRONTEND_IMAGE="ghcr.io/${IMAGE_REPO}/frontend:${{ github.sha }}"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f
